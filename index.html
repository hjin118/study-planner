<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀여운 공부 플래너</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 공부 플래너</h1>
            <div class="header-buttons">
                <button class="settings-btn" id="settingsBtn">⚙️</button>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </header>

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="오늘 공부할 내용은?" maxlength="50">
            <input type="date" id="dateInput">
            <input type="date" id="endDateInput" placeholder="종료일 (선택)">
            <div class="task-customization">
                <input type="color" id="taskColor" value="#ffb6c1" title="색상 선택">
                <select id="taskIcon" title="아이콘 선택">
                    <option value="📚">📚</option>
                    <option value="✏️">✏️</option>
                    <option value="📝">📝</option>
                    <option value="🎯">🎯</option>
                    <option value="💡">💡</option>
                    <option value="📖">📖</option>
                    <option value="🎓">🎓</option>
                    <option value="✅">✅</option>
                    <option value="⭐">⭐</option>
                    <option value="🌟">🌟</option>
                </select>
            </div>
            <button id="addTaskBtn">추가</button>
        </div>

        <div class="calendar-header">
            <button class="nav-btn" id="prevMonth">❮</button>
            <h2 id="currentMonth"></h2>
            <button class="nav-btn" id="nextMonth">❯</button>
        </div>

        <div class="calendar" id="calendar"></div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 플래너 커스터마이징</h2>
                <button class="close-btn" id="closeSettings">✕</button>
            </div>
            <div class="settings-section">
                <h3>인터페이스 색상</h3>
                <div class="color-options">
                    <label>
                        <span>배경색:</span>
                        <input type="color" id="bgPrimaryColor" value="#fef7f0">
                    </label>
                    <label>
                        <span>카드 배경:</span>
                        <input type="color" id="bgCardColor" value="#ffffff">
                    </label>
                    <label>
                        <span>강조색:</span>
                        <input type="color" id="accentColor" value="#ffb6c1">
                    </label>
                    <label>
                        <span>텍스트 색상:</span>
                        <input type="color" id="textColor" value="#5a4a3a">
                    </label>
                </div>
            </div>
            <div class="settings-section">
                <h3>앱 아이콘</h3>
                <div class="icon-selector" id="appIconSelector">
                    <button class="icon-option" data-icon="📚">📚</button>
                    <button class="icon-option" data-icon="📖">📖</button>
                    <button class="icon-option" data-icon="✏️">✏️</button>
                    <button class="icon-option" data-icon="🎓">🎓</button>
                    <button class="icon-option" data-icon="💡">💡</button>
                    <button class="icon-option" data-icon="🎯">🎯</button>
                    <button class="icon-option" data-icon="📝">📝</button>
                    <button class="icon-option" data-icon="✅">✅</button>
                    <button class="icon-option" data-icon="⭐">⭐</button>
                    <button class="icon-option" data-icon="🌟">🌟</button>
                    <button class="icon-option" data-icon="🔥">🔥</button>
                    <button class="icon-option" data-icon="💪">💪</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="clearData">모든 데이터 삭제</button>
                <button class="btn-reset" id="resetSettings">기본값으로 초기화</button>
                <button class="btn-save" id="saveSettings">변경사항 저장</button>
            </div>
        </div>
    </div>

    <div class="character" id="character">
        <img src="https://static.wikia.nocookie.net/d31cf322-4821-4710-9e1f-64d398c69c8f/scale-to-width/755" alt="캐릭터">
        <div class="speech-bubble" id="speechBubble"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
